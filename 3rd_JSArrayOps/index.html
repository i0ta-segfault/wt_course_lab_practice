<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Operations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-5">
        <h2 class="text-center mb-4">Array Operations</h2>
        <div class="card p-4">
            <input type="text" id="arrayInput" class="form-control mb-3" placeholder="Enter numbers separated by commas">
            
            <div class="d-flex flex-wrap gap-2 mb-3">
                <button class="btn btn-primary" id="reverseBtn">Reverse</button>
                <button class="btn btn-success" id="sortAscBtn">Sort Asc</button>
                <button class="btn btn-success" id="sortDescBtn">Sort Desc</button>
                <button class="btn btn-warning" id="searchBtn">Search</button>
            </div>

            <input type="number" id="searchValue" class="form-control mb-3" placeholder="Enter value to search">

            <div class="output-box">
                <h5>Output:</h5>
                <p id="output"></p>
            </div>

        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
