<!DOCTYPE html>
<html>
<head>
<style>
body { display:flex; justify-content:center; align-items:center; height:100vh; }

.box {
  width:120px;
  background:black;
  padding:20px;
  border-radius:10px;
}

.light {
  width:60px;
  height:60px;
  margin:10px auto;
  border-radius:50%;
  background:#333;
}

.red { background:red; box-shadow:0 0 20px red; }
.yellow { background:yellow; box-shadow:0 0 20px yellow; }
.green { background:green; box-shadow:0 0 20px green; }

</style>
</head>

<body>

<div class="box">
  <div id="r" class="light"></div>
  <div id="y" class="light"></div>
  <div id="g" class="light"></div>
</div>

<script>
let state=0;
setInterval(()=>{
  r.className="light";
  y.className="light";
  g.className="light";

  if(state==0) r.classList.add("red");
  if(state==1) y.classList.add("yellow");
  if(state==2) g.classList.add("green");

  state=(state+1)%3;
},1000);
</script>

</body>
</html>
